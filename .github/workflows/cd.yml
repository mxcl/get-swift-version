on:
  release:
    types: [published, updated]
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sersoft-gmbh/running-release-tags-action@master
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
        if: github.event.release.prerelease == false
